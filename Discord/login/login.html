<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../login/login.css">
    <title>Login</title>
</head>
<body>
    <header>
        <a href="../index.html"><img src="../src/imagens-footer/imagens/66e90ab9506850e8a5dd48e3_Discrod_MainLogo.svg" alt="Imagem Fundo"></a>
    </header>

    <main>  
        <div class="conteudo">
            
            <div class="lado-esquerdo">
                <div class="boas-vindas">
                    <h1>Boas-vindas de volta!</h1>
                    <p>Estamos muito animados em te ver novamente!</p>
                </div>

                <div class="login">
                    <label>E-mail ou número de telefone *</label>
                    <input type="email" name="oi" placeholder="Digite seu e-mail ou telefone">

                    <label>Senha *</label>
                    <input type="password" name="password" placeholder="Digite sua senha">

                    <div class="esqueceu-senha">
                        <a href="#">Esqueceu sua senha?</a>
                    </div>

                    <div class="botao-entrar">
                        <a href="#">Entrar</a>
                    </div>

                    <div class="ou">OU</div>
                    
                    <div class="cadastro">
                        <p>Precisando de uma conta? <a href="../cadastro/cadastro.html">Cadastre-se</a></p>
                    </div>
                </div>
            </div>

            <div class="lado-direito">
                <img src="../src/imagens-footer/imagens/QRcode-discord.png" alt="QRcode">
                <div class="conteudo-texto">
                    <p>Entrar com código QR</p>
                    <p>Escaneie isto com o <strong>app móvel do Discord </strong> para fazer login imediatamente.</p>
                </div>
                <div class="passkey">
                    <p>Ou, faça login com uma passkey</p>
                </div>
            </div>

        </div>  
    </main>
</body>
</html>
