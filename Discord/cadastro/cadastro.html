<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../cadastro/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <img src="../src/imagens-footer/imagens/66e90ab9506850e8a5dd48e3_Discrod_MainLogo.svg" alt="Imagem Fundo">
    </header>

    <main>  
        <div class="conteudo">
            
            <div class="lado-esquerdo">
                <div class="boas-vindas">
                    <h1>Criar uma conta</h1>
                </div>

                <div class="login">
                    <label>E-mail *</label>
                    <input type="email" name="email">

                    <label>Nome exibido</label>
                    <input type="text" name="name">

                    <label>Nome de usuário *</label>
                    <input type="text" name="username">

                    <label>Senha *</label>
                    <input type="password" name="password">

                    <label>Data de Nascimento *</label>
                    <input type="date" id="nascimento" name="nascimento" max="2026-05-21">

                    <div class="checkbox">
                        <input type="checkbox" name="checkbox">
                        <label>(Opcional) Tudo bem me mandar e-mails com atualizações do Discord, dicas
                        e ofertas especiais. Você pode mudar isso a qualquer momento.</label>
                    </div>

                    <p>Ao clicar em "Criar conta", você concorda com os <span>termos de serviço</span> do Discord
                    e confirma que leu a <span>política de privacidade</span>.</p>

                    <div class="botao-entrar">
                        <a href="#">Criar conta</a>
                    </div>
                    
                    <div class="cadastro">
                        <p><a href="../login/login.html">Já tem uma conta? Entre aqui</a></p>
                    </div>
                </div>
            </div>

        </div>  
    </main>
</body>
</html>
